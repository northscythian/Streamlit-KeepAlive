name: Keep Streamlit Apps Alive

on:
  schedule:
    # Запуск каждые 6 часов (чаще, чтобы оба приложения не спали)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # позволяет запустить вручную

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Cafe Purchases App
        run: |
          echo "🔄 Пингую Cafe Purchases..."
          curl -I -s https://cafe-purchases-akwmedje7vxh2gsimhemuk.streamlit.app
          echo "✅ Готово"
          
      - name: Ping Accounting Restaurant App
        run: |
          echo "🔄 Пингую Accounting Restaurant..."
          curl -I -s https://accounting-restorant-hawaii-nevkbocshrdvbhx5rqmpti.streamlit.app
          echo "✅ Готово"
          
      - name: Summary
        run: |
          echo "📊 Все приложения пропингованы в $(date)"
